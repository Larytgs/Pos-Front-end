<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue.js</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
</head>
<body>
    <h1>Meu primeiro Exemplo com Vue.js</h1>

    <div id="app">
        {{ mensagem }}
    </div>

    <script>
        var app = new Vue({
            el: '#app',
            data: {
                mensagem: 'Hello hellooooo hellooooo Vue'
            }
        })
    </script>
</body>
</html>
